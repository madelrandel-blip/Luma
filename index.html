<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luma Switch</title>

<meta property="og:type" content="website">
<meta property="og:title" content="Luma Switch">
<meta property="og:description" content="Explora tu biblioteca premium de juegos Nintendo Switch en Luma Switch.">
<meta property="og:image" content="assets/images/Luma icon.webp">
<meta property="og:url" content="https://madelrandel-blip.github.io/testweb/">
<meta property="theme-color" content="#7dd3fc">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Luma Switch">
<meta name="twitter:description" content="Explora tu biblioteca premium de juegos Nintendo Switch en Luma Switch.">
<meta name="twitter:image" content="assets/images/Luma background embed.jpg?raw=true">

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- CANVAS ESTRELLAS -->
<canvas id="stars"></canvas>

<!-- PANTALLA DE BIENVENIDA -->
<div id="welcomeScreen">
    <div class="welcome-overlay"></div>

    <div class="welcome-box">
        <img src="https://raw.githubusercontent.com/madelrandel-blip/testweb/main/Luma..webp" alt="Luma Logo">

        <h2>Bienvenido a Luma Switch</h2>

        <p>
            Explora tu biblioteca premium de juegos Nintendo Switch, emuladores,
            recursos y contenido exclusivo en una experiencia moderna.
        </p>

        <div class="welcome-buttons">
            <button class="accept-btn" onclick="aceptarBienvenida()">
                Entrar a Luma Switch
            </button>
        </div>
    </div>
</div>

<!-- HEADER -->
<header>
    <h2>Luma Switch</h2>

    <!-- BUSCADOR -->
    <input
        type="text"
        id="buscador"
        placeholder="Buscar juegos..."
    >

    <!-- CONTROL DE MÚSICA -->
    <div class="music-control">
        <button class="music-btn" onclick="toggleMusic()" id="musicBtn">
            ▶ Play
        </button>

        <div class="volume-control">
            <span class="volume-icon">🔊</span>

            <input
                type="range"
                id="volumeSlider"
                min="0"
                max="100"
                value="5"
            >
        </div>
    </div>

    <!-- BOTONES HEADER -->
    <div class="header-btn">
        <button onclick="abrirEmuladores()">🎮 Emuladores</button>

        <button onclick="abrirRecursos()">📦 Recursos</button>

        <button onclick="window.open('https://discord.gg/pMvkz2RzkJ','_blank')">
            💬 Discord
        </button>

        <button onclick="abrirLogin()">🔒 Admin</button>

        <button onclick="logout()" id="logoutBtn" style="display:none;">
            🚪 Salir
        </button>
    </div>
</header>

<!-- PANEL ADMIN -->
<div id="adminPanel">
    <h3>Panel Administrador</h3>

    <input type="text" id="nombre" placeholder="Nombre del juego">
    <input type="text" id="img" placeholder="URL imagen">
    <input type="text" id="desc" placeholder="Descripción">
    <input type="text" id="link1" placeholder="Link 1">
    <input type="text" id="link2" placeholder="Link 2">

    <button id="btnGuardar" onclick="agregarJuego()">
        Guardar juego
    </button>
</div>

<!-- TIENDA -->
<div class="store" id="store"></div>

<!-- PAGINACIÓN -->
<div class="pagination" id="pagination"></div>

<!-- LOGIN -->
<div id="loginBox">
    <div class="login-content">
        <h3>Acceso Administrador</h3>

        <input type="text" id="user" placeholder="Usuario / Email">
        <input type="password" id="pass" placeholder="Contraseña">

        <button onclick="login()">Entrar</button>
        <button onclick="cerrarLogin()">Cerrar</button>
    </div>
</div>

<!-- MODAL EMULADORES -->
<div id="emuladoresBox">
    <div class="login-content">
        <h3>Emuladores</h3>

        <div class="store" id="emuladoresStore"></div>

        <button onclick="cerrarEmuladores()">
            Cerrar
        </button>
    </div>
</div>

<!-- MODAL RECURSOS -->
<div id="recursosBox">
    <div class="login-content">
        <h3>Recursos</h3>

        <div class="store" id="recursosStore"></div>

        <button onclick="cerrarRecursos()">
            Cerrar
        </button>
    </div>
</div>

<!-- AUDIO PRINCIPAL -->
<audio id="bgMusic" loop>
    <source src="assets/music/File select.mp3" type="audio/mpeg">
</audio>

<!-- SONIDO BOTONES -->
<audio id="clickSound" preload="auto">
    <source src="assets/sounds/Enter & Back.mp3" type="audio/mpeg">
</audio>

<!-- FIREBASE -->
<script type="module" src="firebase.js"></script>

<!-- SCRIPT PRINCIPAL -->
<script src="script.js"></script>

</body>
</html>
